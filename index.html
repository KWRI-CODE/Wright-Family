<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claire's Kitchen 🍓</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --peach: #FFDDD2;
      --mint: #C9F0DD;
      --lavender: #E4D9F5;
      --yellow: #FFF3C4;
      --coral: #FF7B6B;
      --green: #3BAA72;
      --purple: #7B5EA7;
      --gold: #D4A017;
      --text: #3D3535;
      --text-light: #7A6A6A;
      --white: #FFFAF8;
      --card-bg: #FFFFFF;
      --radius: 20px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--white);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #FFDDD2 0%, #E4D9F5 50%, #C9F0DD 100%);
      padding: 40px 20px 30px;
      text-align: center;
    }

    .header-emoji { font-size: 56px; display: block; margin-bottom: 8px; }

    header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 6px;
      font-size: 1rem;
      color: var(--text-light);
      font-weight: 600;
    }

    /* SEARCH + FILTERS */
    .controls {
      max-width: 800px;
      margin: 28px auto 0;
      padding: 0 16px;
    }

    .search-wrap {
      position: relative;
      margin-bottom: 16px;
    }

    .search-wrap input {
      width: 100%;
      padding: 14px 20px 14px 48px;
      border: 2.5px solid #EDE0D4;
      border-radius: 50px;
      font-size: 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      color: var(--text);
      background: white;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: var(--coral); }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .filter-btn {
      padding: 8px 18px;
      border-radius: 50px;
      border: 2.5px solid transparent;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.18s;
      background: white;
      border-color: #EDE0D4;
      color: var(--text-light);
    }

    .filter-btn.active, .filter-btn:hover {
      color: white;
      border-color: transparent;
    }

    .filter-btn[data-filter="all"].active    { background: var(--coral); }
    .filter-btn[data-filter="breakfast"].active { background: #F4A261; }
    .filter-btn[data-filter="lunch"].active     { background: var(--green); }
    .filter-btn[data-filter="dinner"].active    { background: var(--purple); }
    .filter-btn[data-filter="snack"].active     { background: var(--gold); }
    .filter-btn[data-filter="batch"].active     { background: #4A90D9; }

    .filter-btn:hover { background: var(--coral); color: white; }

    /* GRID */
    .grid {
      max-width: 800px;
      margin: 28px auto 60px;
      padding: 0 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* CARD */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
      display: flex;
      flex-direction: column;
    }

    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }

    .card-header {
      padding: 22px 22px 14px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .card-emoji { font-size: 38px; flex-shrink: 0; }

    .card-title { font-size: 1.05rem; font-weight: 800; line-height: 1.3; }

    .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }

    .tag {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tag-breakfast { background: #FEE4C4; color: #C4621A; }
    .tag-lunch     { background: #C9F0DD; color: #2A7A52; }
    .tag-dinner    { background: #E4D9F5; color: #5B3F8A; }
    .tag-snack     { background: #FFF3C4; color: #9A6E00; }
    .tag-batch     { background: #D4EAFF; color: #1A5FAA; }

    .card-body { padding: 0 22px 18px; flex: 1; }

    .card-desc {
      font-size: 0.88rem;
      color: var(--text-light);
      line-height: 1.55;
      font-weight: 600;
    }

    .card-meta {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-light);
    }

    .card-meta span { display: flex; align-items: center; gap: 4px; }

    .expand-btn {
      margin: 0 22px 18px;
      padding: 10px;
      border-radius: 12px;
      border: none;
      background: var(--white);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--coral);
      cursor: pointer;
      transition: background 0.15s;
      text-align: center;
    }

    .expand-btn:hover { background: var(--peach); }

    /* RECIPE DETAIL */
    .recipe-detail {
      display: none;
      padding: 0 22px 22px;
      border-top: 2px dashed #F0E0D8;
      margin-top: 4px;
    }

    .recipe-detail.open { display: block; }

    .recipe-detail h4 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-light);
      margin: 16px 0 8px;
    }

    .recipe-detail ul, .recipe-detail ol {
      padding-left: 18px;
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.8;
      color: var(--text);
    }

    .recipe-detail .storage-box {
      background: var(--mint);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.85rem;
      font-weight: 700;
      margin-top: 14px;
      color: #1F6645;
    }

    /* EMPTY STATE */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }

    .empty-emoji { font-size: 48px; display: block; margin-bottom: 12px; }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.8rem;
      color: var(--text-light);
      font-weight: 600;
    }
  </style>
</head>

let activeFilter = "all";
let searchTerm = "";

function getTags(recipe) {
  return recipe.tags.map(t => `<span class="tag tag-${t}">${t}</span>`).join("");
}

function renderCards() {
  const grid = document.getElementById("grid");
  const filtered = recipes.filter(r => {
    const matchFilter = activeFilter === "all" || r.tags.includes(activeFilter);
    const matchSearch = searchTerm === "" ||
      r.title.toLowerCase().includes(searchTerm) ||
      r.desc.toLowerCase().includes(searchTerm) ||
      r.ingredients.join(" ").toLowerCase().includes(searchTerm);
    return matchFilter && matchSearch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty"><span class="empty-emoji">🥺</span><p>No recipes found — try a different search!</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(r => `
    <div class="card" id="card-${r.id}">
      <div class="card-header">
        <span class="card-emoji">${r.emoji}</span>
        <div>
          <div class="card-title">${r.title}</div>
          <div class="card-tags">${getTags(r)}</div>
        </div>
      </div>
      <div class="card-body">
        <p class="card-desc">${r.desc}</p>
        <div class="card-meta">
          <span>⏱ ${r.time}</span>
          <span>🍽 ${r.makes}</span>
        </div>
      </div>
      <button class="expand-btn" onclick="toggle(${r.id})">See recipe ↓</button>
      <div class="recipe-detail" id="detail-${r.id}">
        <h4>Ingredients</h4>
        <ul>${r.ingredients.map(i => `<li>${i}</li>`).join("")}</ul>
        <h4>Steps</h4>
        <ol>${r.steps.map(s => `<li>${s}</li>`).join("")}</ol>
        <div class="storage-box">📦 ${r.storage}</div>
      </div>
    </div>
  `).join("");
}

function toggle(id) {
  const detail = document.getElementById(`detail-${id}`);
  const btn = detail.previousElementSibling;
  const open = detail.classList.toggle("open");
  btn.textContent = open ? "Hide recipe ↑" : "See recipe ↓";
}

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    renderCards();
  });
});

document.getElementById("search").addEventListener("input", e => {
  searchTerm = e.target.value.toLowerCase().trim();
  renderCards();
});

renderCards();
</script>
</body>
</html>
